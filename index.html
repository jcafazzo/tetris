    new THREE.MeshStandardMaterial({color:m,roughness:0.15,metalness:0.1,emissive:e,emissiveIntensity:ei*0.5,transparent:o<1,opacity:o}),
    new THREE.MeshStandardMaterial({color:l,roughness:0.06,metalness:0.25,emissive:e,emissiveIntensity:ei,transparent:o<1,opacity:o}),
    new THREE.MeshStandardMaterial({color:m,roughness:0.15,metalness:0.1,emissive:e,emissiveIntensity:ei*0.5,transparent:o<1,opacity:o}),
    new THREE.MeshStandardMaterial({color:m,roughness:0.1,metalness:0.3,emissive:e,emissiveIntensity:ei,transparent:o<1,opacity:o}),
    new THREE.MeshStandardMaterial({color:m,roughness:0.15,metalness:0.1,emissive:e,emissiveIntensity:ei*0.5,transparent:o<1,opacity:o})];
  const h=new THREE.Mesh(g,ms);h.castShadow=true;h.receiveShadow=true;
  if(!ghost&&emissive){const hl=new THREE.Mesh(new THREE.PlaneGeometry(0.5,0.5),new THREE.MeshBasicMaterial({color:m,transparent:true,opacity:0.15,depthWrite:false}));hl.position.z=-0.2;h.add(hl);}
  return h;}
function rnd(){const n=NAMES[Math.floor(Math.random()*NAMES.length)];return{n,s:SHAPES[n].map(r=>[...r])};}
function hit(x,y,s){for(let r=0;r<s.length;r++)for(let c=0;c<s[r].length;c++)if(s[r][c]){const bx=x+c,by=y-(s.length-1-r);if(bx<0||bx>=COLS||by<0)return 1;if(by<ROWS&&board[by][bx])return 1;}return 0;}

let sparkles=[];
function spk(x,y,cl,cnt=10){for(let i=0;i<cnt;i++){const sz=0.008+Math.random()*0.03;const g=new THREE.CircleGeometry(sz,4);
  const m=new THREE.Mesh(g,new THREE.MeshBasicMaterial({color:cl||0xffffff,transparent:true,opacity:0.6,depthWrite:false}));
  m.position.set(x+(Math.random()-0.5)*0.5,y+(Math.random()-0.5)*0.5,0.3);
  m.userData={vx:(Math.random()-0.5)*3.5,vy:Math.random()*2.5+(Math.random()-0.5)*1.5,vz:(Math.random()-0.5)*1.5,life:0.2+Math.random()*0.25};
  scn.add(m);sparkles.push(m);}}
function ups(dt){for(let i=sparkles.length-1;i>=0;i--){const m=sparkles[i],d=m.userData;m.position.x+=d.vx*dt;m.position.y+=d.vy*dt;m.position.z+=d.vz*dt;d.life-=dt;m.material.opacity=Math.max(0,d.life/0.2);m.scale.setScalar(1+d.life*3);if(d.life<=0){scn.remove(m);m.geometry.dispose();m.material.dispose();sparkles.splice(i,1);}}}

let sb=0;
function spn(){if(!nxt)nxt=rnd();const{n,s}=nxt;nxt=rnd();dn();const x=Math.floor((COLS-s[0].length)/2),y=ROWS-1;const grp=new THREE.Group();grp.scale.setScalar(0.01);
  for(let r=0;r<s.length;r++)for(let c=0;c<s[r].length;c++)if(s[r][c]){const m=blk(COL[n],{em:true});m.position.set(x+c,y-(s.length-1-r),0);grp.add(m);}
  scn.add(grp);cur={n,s,x,y,grp};if(hit(x,y,s)){go=1;sho();}
  sb=1;if(!hasStarted){hasStarted=1;if(!pf)SFX.st();}}
function rot(){if(!cur||go||anim)return;const rm=(m=>{const n=m.length,a=Array.from({length:n},()=>Array(n).fill(0));for(let i=0;i<n;i++)for(let j=0;j<n;j++)a[j][n-1-i]=m[i][j];return a;})(cur.s);const{x,y}=cur,ks=[[0,0],[-1,0],[1,0],[-2,0],[2,0],[0,1],[-1,1],[1,1],[0,-1],[-1,-1],[1,-1]];for(const[kx,ky]of ks)if(!hit(x+kx,y+ky,rm)){cur.s=rm;cur.x+=kx;cur.y+=ky;reb();SFX.rt();spk(x+cur.s[0].length/2,y-cur.s.length/2,COL[cur.n][0],4);return;}}
function mov(dx,dy){if(!cur||go||anim)return 0;const{x,y,s}=cur;if(!hit(x+dx,y+dy,s)){cur.x+=dx;cur.y+=dy;reb();if(dy<0&&!go)SFX.sd();else if(dx!==0)SFX.m();return 1;}return 0;}
function reb(){if(!cur)return;const{grp,s,x,y,n}=cur;let i=0;for(let r=0;r<s.length;r++)for(let c=0;c<s[r].length;c++)if(s[r][c]){const px=x+c,py=y-(s.length-1-r);if(i<grp.children.length)grp.children[i].position.set(px,py,0);else{const m=blk(COL[n],{em:true});m.position.set(px,py,0);grp.add(m);}i++;}while(grp.children.length>i){const c=grp.children[grp.children.length-1];grp.remove(c);c.geometry?.dispose();if(Array.isArray(c.material))c.material.forEach(m=>m.dispose());else c.material?.dispose();}}

const parts=[];
function spt(rw){const cs=[0x00e5ff,0xffdd00,0xcc44ff,0x00ff66,0xff3355,0x3366ff,0xff8800];for(let i=0;i<25;i++){const sz=0.02+Math.random()*0.06;const g=new THREE.BoxGeometry(sz,sz,sz);const m=new THREE.MeshBasicMaterial({color:cs[Math.floor(Math.random()*cs.length)],transparent:true,opacity:0.8});const h=new THREE.Mesh(g,m);const r=rw[Math.floor(Math.random()*rw.length)];const c=Math.floor(Math.random()*COLS);h.position.set(c+(Math.random()-0.5)*0.5,r+(Math.random()-0.5)*0.5,0.2);h.userData={vx:(Math.random()-0.5)*4,vy:Math.random()*5,vz:(Math.random()-0.5)*2.5,life:0.4+Math.random()*0.4};scn.add(h);parts.push(h);}}
function upt(dt){for(let i=parts.length-1;i>=0;i--){const m=parts[i],d=m.userData;d.vy-=7*dt;m.position.x+=d.vx*dt;m.position.y+=d.vy*dt;m.position.z+=d.vz*dt;d.life-=dt;m.material.opacity=Math.max(0,d.life/0.4);m.rotation.x+=dt*4;m.rotation.y+=dt*6;if(d.life<=0){scn.remove(m);m.geometry.dispose();m.material.dispose();parts.splice(i,1);}}}

function sfx(p,c='rgba(255,255,255,0.3)'){
  sf.textContent='✦ '+p;sf.style.color=c;sf.style.opacity='0.55';sf.style.transform='translate(-50%,-50%)';
  requestAnimationFrame(()=>{sf.style.transition='opacity 1.2s ease,transform 1.2s cubic-bezier(0.16,1,0.3,1)';sf.style.opacity='0';sf.style.transform='translate(-50%,-130%)';});
  setTimeout(()=>{sf.style.transition='none';sf.style.transform='translate(-50%,-50%)';},1300);}

function lk(){if(!cur)return;const{s,x,y,n,grp}=cur;
  for(let r=0;r<s.length;r++)for(let c=0;c<s[r].length;c++)if(s[r][c]){const bx=x+c,by=y-(s.length-1-r);if(by>=0&&by<ROWS){board[by][bx]=n;const m=blk(COL[n]);m.position.set(bx,by,0);scn.add(m);bm[by][bx]=m;}}
  scn.remove(grp);while(grp.children.length){const c=grp.children[0];grp.remove(c);c.geometry?.dispose();if(Array.isArray(c.material))c.material.forEach(m=>m.dispose());else c.material?.dispose();}
  cur=null;shk=0.2;skd=5;SFX.lk();spk(x+s.length/2,y-s.length/2,0xffffff,6);cl();}
function cl(){const tc=[];for(let r=0;r<ROWS;r++)if(board[r].every(c=>c!==null))tc.push(r);if(tc.length===0){spn();return;}
  anim=true;shk=0.4+tc.length*0.2;skd=7;const ms=[];for(const r of tc)for(let c=0;c<COLS;c++){if(bm[r][c])ms.push(bm[r][c]);bm[r][c]=null;board[r][c]=null;}
  if(pf||ms.length===0){dn();return;}
  SFX.lc(tc.length);spt(tc);
  const p2=[0,100,300,500,800];const ad=(p2[tc.length]||800)*(Math.floor(ln/10)+1);sfx(ad,'rgba(255,220,100,0.4)');
  const dur=0.3,st=performance.now();
  (function f(t){const p=Math.min((t-st)/1000/dur,1),e=1-Math.pow(1-p,3);for(const m of ms){const s=1-e*0.9;m.scale.set(s,s,s);m.position.z=-e*0.25;if(Array.isArray(m.material))m.material.forEach(mat=>{mat.opacity=1-e;mat.transparent=true;});else{m.material.opacity=1-e;m.material.transparent=true;}}if(p<1)requestAnimationFrame(f);else{for(const m of ms){scn.remove(m);m.geometry?.dispose();if(Array.isArray(m.material))m.material.forEach(m2=>m2.dispose());else m.material?.dispose();}dn();}})(st);
  function dn(){const sd2=[...tc].sort((a,b)=>b-a);for(const r of sd2){for(let rr=r;rr<ROWS-1;rr++){board[rr]=[...board[rr+1]];bm[rr]=[...bm[rr+1]];for(let c=0;c<COLS;c++)if(bm[rr][c])bm[rr][c].position.y=rr;}board[ROWS-1]=Array(COLS).fill(null);bm[ROWS-1]=Array(COLS).fill(null);}
    const p3=[0,100,300,500,800];const pl=Math.floor(ln/10);const ad2=(p3[tc.length]||800)*(Math.floor(ln/10)+1);
    scor+=ad2;ln+=tc.length;intv=Math.max(100,800-Math.min(Math.floor(ln/10),11)*60);
    scEl.textContent=sc.toLocaleString();lnEl.textContent=ln;
    // Level up — new audio track!
    const newLvl=Math.floor(ln/10);
    if(newLvl>pl){
      lnEl.classList.add('lv-pop');setTimeout(()=>lnEl.classList.remove('lv-pop'),400);
      if(newLvl<4){audioLevel=newLvl;bpm=BPM[audioLevel];SFX.lu();mu=true;}
      else SFX.lu();
    }
    scEl.classList.add('pop');setTimeout(()=>scEl.classList.remove('pop'),300);anim=false;spn();}}
function dp(){if(!cur||go||anim)return;const{s,x,y}=cur;let dy=0;while(!hit(x,y+dy-1,s))dy--;const d=Math.abs(dy);scor+=d*2;scEl.textContent=scor.toLocaleString();cur.y+=dy;reb();shk=0.6;skd=8;SFX.hd();spk(x+s[0].length/2,y-d/2,COL[cur.n][0],10);lk();}

let gh=null;
function ugh(){if(gh){scn.remove(gh);while(gh.children.length){const c=gh.children[0];gh.remove(c);c.geometry?.dispose();if(Array.isArray(c.material))c.material.forEach(m=>m.dispose());else c.material?.dispose();}gh=null;}
  if(!cur||go)return;const{s,x,y,n}=cur;let gy=y;while(!hit(x,gy-1,s))gy--;if(gy===y)return;
  gh=new THREE.Group();for(let r=0;r<s.length;r++)for(let c=0;c<s[r].length;c++)if(s[r][c]){const m=blk(COL[n],{gh:true});m.position.set(x+c,gy-(s.length-1-r),0);gh.add(m);}scn.add(gh);}

if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){if(r>w/2)r=w/2;if(r>h/2)r=h/2;this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);this.closePath();};}
function dn(){nctx.clearRect(0,0,ncvs.width,ncvs.height);if(!nxt)return;
  const s=nxt.s,r=s.length,co=s[0].length,sz=16,gp=3,tw=co*(sz+gp)-gp,th=r*(sz+gp)-gp,ox=(ncvs.width-tw)/2,oy=(ncvs.height-th)/2,cl=COL[nxt.n];
  for(let rr=0;rr<r;rr++)for(let c=0;c<co;c++)if(s[rr][c]){const x=ox+c*(sz+gp),y=oy+rr*(sz+gp);
    nctx.shadowColor='rgba(255,255,255,0.05)';nctx.shadowBlur=8;
    nctx.fillStyle='#'+cl[0].toString(16).padStart(6,'0');nctx.beginPath();nctx.roundRect(x,y,sz,sz,2);nctx.fill();
    nctx.shadowBlur=0;nctx.fillStyle='rgba(255,255,255,0.1)';nctx.beginPath();nctx.roundRect(x+2,y+1,sz-4,sz*0.22,1.5);nctx.fill();}}

function sho(){fsEl.textContent=scor.toLocaleString();SFX.go();setTimeout(()=>ov.classList.add('active'),500);}
function rst(){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){if(bm[r][c]){scn.remove(bm[r][c]);bm[r][c].geometry?.dispose();if(Array.isArray(bm[r][c].material))bm[r][c].material.forEach(m=>m.dispose());else bm[r][c].material?.dispose();bm[r][c]=null;}board[r][c]=null;}
  for(const m of parts){scn.remove(m);m.geometry?.dispose();m.material?.dispose();}parts.length=0;
  for(const m of sparkles){scn.remove(m);m.geometry?.dispose();m.material?.dispose();}sparkles.length=0;
  if(cur){scn.remove(cur.grp);cur=null;}if(gh){scn.remove(gh);gh=null;}
  anim=false;scor=0;ln=0;intv=800;go=false;shk=0;bt=0;bi=0;hasStarted=false;audioLevel=0;bpm=135;
  ov.classList.remove('active');scEl.textContent='0';lnEl.textContent='0';nxt=rnd();dn();spn();}

let das=0,dd=0;
document.addEventListener('keydown',e=>{
  ia();if(e.repeat&&['ArrowLeft','ArrowRight','ArrowDown','ArrowUp',' '].includes(e.key))return;
  if(go){if(e.key==='r'||e.key==='R'){rst();e.preventDefault();}return;}
  switch(e.key){
    case'ArrowLeft':if(mov(-1,0)){ugh();dd=-1;das=0;}e.preventDefault();break;
    case'ArrowRight':if(mov(1,0)){ugh();dd=1;das=0;}e.preventDefault();break;
    case'ArrowDown':if(mov(0,-1)){ugh();scor+=1;dtmr=0;scEl.textContent=scor.toLocaleString();}e.preventDefault();break;
    case'ArrowUp':rot();ugh();e.preventDefault();break;
    case' ':dp();e.preventDefault();break;}});
document.addEventListener('keyup',e=>{if(e.key==='ArrowLeft'&&dd===-1)dd=0;if(e.key==='ArrowRight'&&dd===1)dd=0;});
document.getElementById('tc').addEventListener('click',e=>{const btn=e.target.closest('[data-action]');if(!btn)return;e.preventDefault();ia();const a=btn.dataset.action;
  if(go){if(a==='drop')rst();return;}
  switch(a){case'left':mov(-1,0)&&(ugh(),dd=0,das=0);break;case'right':mov(1,0)&&(ugh(),dd=0,das=0);break;case'rotate':rot();ugh();break;case'down':mov(0,-1)&&(ugh(),scor+=1,dtmr=0,scEl.textContent=scor.toLocaleString(),dd=0,das=0);break;case'drop':dp();break;}});
rb.addEventListener('click',rst);

let at=0,beatPhase=0;
(function f(t){
  requestAnimationFrame(f);const dt=lst?Math.min((t-lst)/1000,0.05):0;lst=t;
  if(!go&&hasStarted&&!pf)bd(dt);
  if(shk>0.01){const sx=(Math.random()-0.5)*shk,sy=(Math.random()-0.5)*shk;ca.position.x=COLS/2-0.5+sx;ca.position.y=ROWS/2-1+sy;shk-=skd*dt;if(shk<0)shk=0;}
  else{ca.position.x=COLS/2-0.5;ca.position.y=ROWS/2-1;}
  ca.lookAt(COLS/2-0.5,ROWS/2-1,0);
  if(sparkles.length)ups(dt);if(parts.length)upt(dt);
  if(sb>0&&cur){const p=Math.min(sb,1),e=1-Math.pow(1-p,3),sc2=0.01+(1-0.01)*e;cur.grp.scale.setScalar(sc2);sb+=dt*3;if(sb>=1){cur.grp.scale.setScalar(1);sb=0;}}
  for(const p of bParticles){p.position.x+=p.userData.vx*dt;p.position.y+=p.userData.vy*dt;p.userData.ph+=dt*0.3;p.material.opacity=0.03+Math.sin(p.userData.ph)*0.04;p.rotation.z+=p.userData.rs*dt;if(p.position.x>12)p.position.x=-2;if(p.position.x<-2)p.position.x=12;if(p.position.y>22)p.position.y=-2;if(p.position.y<-2)p.position.y=22;}
  gr.material.opacity=0.03+Math.sin(t*0.001)*0.015;
  
  if(!go&&cur&&!anim){
    if(dd!==0){das+=dt*1000;if(das>=170){const rc=Math.floor((das-170)/50);for(let i=0;i<rc+1;i++)if(!mov(dd,0))break;ugh();das=170+((das-170)%50);}}
    dtmr+=dt*1000;if(dtmr>=intv){dtmr=0;if(!mov(0,-1)){lk();}else ugh();}
  }else dtmr=0;
  ren.render(scn,ca);
})(0);
nxt=rnd();dn();spn();
</script>
